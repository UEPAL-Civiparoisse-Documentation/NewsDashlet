name: Build Deploy Jekyll site
on:
 push:
   branches: ["main"]
 workflow_dispatch:  
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false  
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        id: jekyll-artifact-upload-step
        with:
          path: '_site'
          name: jekyll-news-deployment-${{ github.sha }}-${{ github.run_number }}-${{ github.run_attempt }}
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: jekyll-news-deployment-${{ github.sha }}-${{ github.run_number }}-${{ github.run_attempt }}

